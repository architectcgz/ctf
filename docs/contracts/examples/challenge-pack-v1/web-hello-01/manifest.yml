spec_version: challenge-pack-v1

slug: web-hello-01
title: "Web-01 Hello Container"
category: web
difficulty: easy
tags:
  - kp:container-basics
  - stack:python
  - stack:flask

description:
  file: statement.md

hints:
  - text: "先确认服务端口与路由是否正常。"
    cost: 10

attachments: []

flag:
  mode: dynamic # static | dynamic | manual

runtime:
  type: container # container | none
  image:
    source: dockerfile # registry | dockerfile | tar
    context_dir: docker
    dockerfile: Dockerfile
  expose:
    - container_port: 8080
      protocol: tcp

instance:
  ttl: "2h"
  max_per_user: 1

resources:
  cpu: 0.5
  memory: "256m"
  pids: 100
