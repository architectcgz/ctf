openapi: 3.0.3
info:
  title: CTF Platform API (v1)
  version: "1.0.0"
  description: |
    机器可读接口契约（OpenAPI 3.0）。

    - 业务字段/返回结构以 `ctf/docs/contracts/api-contract-v1.md` 为准
    - 错误码以 `ctf/docs/architecture/backend/04-api-design.md` §3 为准
    - WebSocket 端点与消息格式见 `ctf/docs/contracts/api-contract-v1.md` §9（不在 OpenAPI 范围）
  x-last-updated: "2026-04-01"

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Challenges
  - name: Instances
  - name: Contests
  - name: Notifications
  - name: Teacher
  - name: Assessment
  - name: Reports
  - name: Admin
  - name: Authoring

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: ctf_refresh_token

  schemas:
    ID:
      type: string
      description: "统一：所有 id/xxx_id 字段均返回 string（避免 JS 超过 2^53 精度问题）"
    ISODateTime:
      type: string
      format: date-time
      description: 'RFC3339/ISO8601，如 "2026-03-01T03:15:22Z"'

    FieldError:
      type: object
      required: [field, message]
      properties:
        field: { type: string }
        message: { type: string }

    ApiEnvelopeBase:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: integer
          description: "0=成功，非0=业务错误码（见 backend/04-api-design.md §3）"
        message:
          type: string
          description: '成功固定 "success"，失败为摘要信息（前端提示优先走 errorMap）'
        request_id:
          type: string
          description: "必填：用于日志追踪"
        errors:
          type: array
          items: { $ref: "#/components/schemas/FieldError" }

    ApiEnvelopeNull:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data:
              nullable: true
              description: "无业务数据时为 null"

    PageResult:
      type: object
      required: [list, total, page, page_size]
      properties:
        list:
          type: array
          items: {}
          description: "列表项类型由具体接口覆盖"
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    UserRole:
      type: string
      enum: [student, teacher, admin]

    AuthUser:
      type: object
      required: [id, username, role]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        username: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
        avatar: { type: string, nullable: true }
        name: { type: string, nullable: true }
        class_name: { type: string, nullable: true }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    LoginData:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token: { type: string }
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: "秒"
        user: { $ref: "#/components/schemas/AuthUser" }

    ApiEnvelopeLoginData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/LoginData" }

    RefreshData:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        token_type:
          type: string
          enum: [Bearer]
        expires_in: { type: integer }

    ApiEnvelopeRefreshData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/RefreshData" }

    WsTicketData:
      type: object
      required: [ticket, expires_at]
      properties:
        ticket: { type: string }
        expires_at: { $ref: "#/components/schemas/ISODateTime" }

    ApiEnvelopeWsTicketData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/WsTicketData" }

    CASStatusData:
      type: object
      required: [provider, enabled, configured, auto_provision, login_path, callback_path]
      properties:
        provider:
          type: string
          enum: [cas]
        enabled: { type: boolean }
        configured: { type: boolean }
        auto_provision: { type: boolean }
        login_path: { type: string }
        callback_path: { type: string }

    ApiEnvelopeCASStatusData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/CASStatusData" }

    CASLoginData:
      type: object
      required: [provider, redirect_url, callback_url]
      properties:
        provider:
          type: string
          enum: [cas]
        redirect_url: { type: string }
        callback_url: { type: string }

    ApiEnvelopeCASLoginData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/CASLoginData" }

    ChallengeCategory:
      type: string
      enum: [web, pwn, reverse, crypto, misc, forensics]
    ChallengeDifficulty:
      type: string
      enum: [beginner, easy, medium, hard, hell]

    ChallengeListItem:
      type: object
      required:
        [id, title, category, difficulty, tags, solved_count, total_attempts, is_solved, points, created_at]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        title: { type: string }
        category: { $ref: "#/components/schemas/ChallengeCategory" }
        difficulty: { $ref: "#/components/schemas/ChallengeDifficulty" }
        tags:
          type: array
          items: { type: string }
        solved_count: { type: integer, minimum: 0 }
        total_attempts: { type: integer, minimum: 0 }
        is_solved: { type: boolean }
        points: { type: integer, minimum: 0 }
        created_at: { $ref: "#/components/schemas/ISODateTime" }

    ChallengeListData:
      type: object
      required: [list, total, page, page_size]
      properties:
        list:
          type: array
          items: { $ref: "#/components/schemas/ChallengeListItem" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    ApiEnvelopeChallengeListData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/ChallengeListData" }

    ChallengeHint:
      type: object
      required: [id, level, is_unlocked]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        level: { type: integer, minimum: 1 }
        title: { type: string, nullable: true }
        cost_points: { type: integer, nullable: true, minimum: 0 }
        is_unlocked: { type: boolean }
        content: { type: string, nullable: true }

    ChallengeDetailData:
      type: object
      required:
        [id, title, description, category, difficulty, tags, points, need_target, is_solved, hints]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        title: { type: string }
        description:
          type: string
          description: "Markdown"
        category: { $ref: "#/components/schemas/ChallengeCategory" }
        difficulty: { $ref: "#/components/schemas/ChallengeDifficulty" }
        tags:
          type: array
          items: { type: string }
        points: { type: integer, minimum: 0 }
        need_target: { type: boolean, description: "题目是否需要启动靶机实例" }
        attachment_url: { type: string, nullable: true }
        is_solved: { type: boolean }
        solved_at: { $ref: "#/components/schemas/ISODateTime", nullable: true }
        hints:
          type: array
          items: { $ref: "#/components/schemas/ChallengeHint" }

    ApiEnvelopeChallengeDetailData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/ChallengeDetailData" }

    InstanceStatus:
      type: string
      enum: [pending, creating, running, expired, destroying, destroyed, failed, crashed]
    FlagType:
      type: string
      enum: [static, dynamic, regex, manual_review]

    SshInfo:
      type: object
      required: [host, port, username]
      properties:
        host: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username: { type: string }

    InstanceData:
      type: object
      required: [id, challenge_id, status, flag_type, expires_at, remaining_extends, created_at]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        challenge_id: { $ref: "#/components/schemas/ID" }
        status: { $ref: "#/components/schemas/InstanceStatus" }
        access_url: { type: string, nullable: true }
        ssh_info: { $ref: "#/components/schemas/SshInfo", nullable: true }
        flag_type: { $ref: "#/components/schemas/FlagType" }
        expires_at: { $ref: "#/components/schemas/ISODateTime" }
        remaining_extends: { type: integer, minimum: 0 }
        created_at: { $ref: "#/components/schemas/ISODateTime" }
        queue_position: { type: integer, nullable: true, minimum: 1 }
        eta_seconds: { type: integer, nullable: true, minimum: 0 }
        progress: { type: integer, nullable: true, minimum: 0, maximum: 100 }

    ApiEnvelopeInstanceData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/InstanceData" }

    InstanceExtendData:
      type: object
      required: [id, expires_at, remaining_extends]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        expires_at: { $ref: "#/components/schemas/ISODateTime" }
        remaining_extends: { type: integer, minimum: 0 }

    ApiEnvelopeInstanceExtendData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/InstanceExtendData" }

    InstanceAccessData:
      type: object
      required: [access_url]
      properties:
        access_url: { type: string }

    ApiEnvelopeInstanceAccessData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/InstanceAccessData" }

    InstanceListItem:
      allOf:
        - $ref: "#/components/schemas/InstanceData"
        - type: object
          required: [challenge_title, category, difficulty]
          properties:
            challenge_title: { type: string }
            category: { $ref: "#/components/schemas/ChallengeCategory" }
            difficulty: { $ref: "#/components/schemas/ChallengeDifficulty" }

    ApiEnvelopeInstanceListData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/InstanceListItem" }

    SubmitFlagRequest:
      type: object
      required: [flag]
      properties:
        flag: { type: string }

    SubmitFlagData:
      type: object
      required: [is_correct, status, message, submitted_at]
      properties:
        is_correct: { type: boolean }
        status:
          type: string
          enum: [correct, incorrect, pending_review]
        message: { type: string }
        points: { type: integer, nullable: true, minimum: 0 }
        submitted_at: { $ref: "#/components/schemas/ISODateTime" }

    ApiEnvelopeSubmitFlagData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/SubmitFlagData" }

    AdminChallengeFlagConfigData:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }
        flag_type: { $ref: "#/components/schemas/FlagType", nullable: true }
        flag_regex: { type: string, nullable: true }
        flag_prefix: { type: string, nullable: true }

    ApiEnvelopeAdminChallengeFlagConfigData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/AdminChallengeFlagConfigData" }

    ConfigureChallengeFlagRequest:
      type: object
      required: [flag_type]
      properties:
        flag_type: { $ref: "#/components/schemas/FlagType" }
        flag: { type: string, nullable: true }
        flag_regex: { type: string, nullable: true }
        flag_prefix: { type: string, nullable: true }

    ConfigureChallengeFlagData:
      type: object
      required: [message]
      properties:
        message: { type: string }

    ApiEnvelopeConfigureChallengeFlagData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/ConfigureChallengeFlagData" }

    UnlockHintData:
      type: object
      required: [hint]
      properties:
        hint: { $ref: "#/components/schemas/ChallengeHint" }
        points_spent: { type: integer, nullable: true, minimum: 0 }
        remaining_points: { type: integer, nullable: true, minimum: 0 }

    ApiEnvelopeUnlockHintData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/UnlockHintData" }

    MyProgressData:
      type: object
      required: [total_challenges, solved_challenges]
      properties:
        total_challenges: { type: integer, minimum: 0 }
        solved_challenges: { type: integer, minimum: 0 }
        by_category:
          type: object
          nullable: true
          additionalProperties:
            type: object
            required: [total, solved]
            properties:
              total: { type: integer, minimum: 0 }
              solved: { type: integer, minimum: 0 }
        by_difficulty:
          type: object
          nullable: true
          additionalProperties:
            type: object
            required: [total, solved]
            properties:
              total: { type: integer, minimum: 0 }
              solved: { type: integer, minimum: 0 }

    ApiEnvelopeMyProgressData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/MyProgressData" }

    TimelineEvent:
      type: object
      required: [id, type, title, created_at]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        type:
          type: string
          enum: [solve, submit, instance, hint]
        title: { type: string }
        created_at: { $ref: "#/components/schemas/ISODateTime" }
        meta:
          type: object
          nullable: true
          additionalProperties: true

    ApiEnvelopeMyTimelineData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/TimelineEvent" }

    ContestMode:
      type: string
      enum: [jeopardy, awd, awd_plus, king_of_hill]
    ContestStatus:
      type: string
      enum: [draft, published, registering, running, frozen, ended, cancelled, archived]

    ContestListItem:
      type: object
      required: [id, title, mode, status, starts_at, ends_at]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        title: { type: string }
        mode: { $ref: "#/components/schemas/ContestMode" }
        status: { $ref: "#/components/schemas/ContestStatus" }
        starts_at: { $ref: "#/components/schemas/ISODateTime" }
        ends_at: { $ref: "#/components/schemas/ISODateTime" }
        register_ends_at: { $ref: "#/components/schemas/ISODateTime", nullable: true }

    ContestListData:
      type: object
      required: [list, total, page, page_size]
      properties:
        list:
          type: array
          items: { $ref: "#/components/schemas/ContestListItem" }
        total: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1 }

    ApiEnvelopeContestListData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/ContestListData" }

    ContestDetailData:
      allOf:
        - $ref: "#/components/schemas/ContestListItem"
        - type: object
          properties:
            description: { type: string, nullable: true }
            rules: { type: string, nullable: true, description: "Markdown" }
            team_size_limit: { type: integer, nullable: true, minimum: 1 }
            scoreboard_frozen: { type: boolean, nullable: true }

    ApiEnvelopeContestDetailData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/ContestDetailData" }

    ContestChallengeItem:
      type: object
      required: [id, challenge_id, title, category, difficulty, points, solved_count, is_solved]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        challenge_id: { $ref: "#/components/schemas/ID" }
        title: { type: string }
        category: { $ref: "#/components/schemas/ChallengeCategory" }
        difficulty: { $ref: "#/components/schemas/ChallengeDifficulty" }
        points: { type: integer, minimum: 0 }
        solved_count: { type: integer, minimum: 0 }
        is_solved: { type: boolean }

    ApiEnvelopeContestChallengeListData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/ContestChallengeItem" }

    ScoreboardRow:
      type: object
      required: [rank, team_id, team_name, score, solved_count]
      properties:
        rank: { type: integer, minimum: 1 }
        team_id: { $ref: "#/components/schemas/ID" }
        team_name: { type: string }
        score: { type: integer, minimum: 0 }
        solved_count: { type: integer, minimum: 0 }
        last_submission_at: { $ref: "#/components/schemas/ISODateTime", nullable: true }

    ContestScoreboardData:
      type: object
      required: [contest, scoreboard, frozen]
      properties:
        contest:
          type: object
          required: [id, title, status, started_at, ends_at]
          properties:
            id: { $ref: "#/components/schemas/ID" }
            title: { type: string }
            status: { $ref: "#/components/schemas/ContestStatus" }
            started_at: { $ref: "#/components/schemas/ISODateTime" }
            ends_at: { $ref: "#/components/schemas/ISODateTime" }
        scoreboard:
          type: object
          required: [list, total, page, page_size]
          properties:
            list:
              type: array
              items: { $ref: "#/components/schemas/ScoreboardRow" }
            total: { type: integer, minimum: 0 }
            page: { type: integer, minimum: 1 }
            page_size: { type: integer, minimum: 1 }
        frozen: { type: boolean }

    ApiEnvelopeContestScoreboardData:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelopeBase"
        - type: object
          required: [data]
          properties:
            data: { $ref: "#/components/schemas/ContestScoreboardData" }

    TopologyTier:
      type: string
      enum: [public, service, internal]

    TopologyPolicyAction:
      type: string
      enum: [allow, deny]

    TopologyPolicyProtocol:
      type: string
      enum: [tcp, udp, any]

    TopologyNetwork:
      type: object
      required: [key, name]
      properties:
        key: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 128 }
        cidr: { type: string, nullable: true }
        internal: { type: boolean }

    TopologyNode:
      type: object
      required: [key, name]
      properties:
        key: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 128 }
        image_id: { $ref: "#/components/schemas/ID", nullable: true }
        service_port: { type: integer, minimum: 1, maximum: 65535, nullable: true }
        inject_flag: { type: boolean }
        tier: { $ref: "#/components/schemas/TopologyTier", nullable: true }
        network_keys:
          type: array
          items: { type: string, maxLength: 64 }
        env:
          type: object
          additionalProperties: { type: string }
        resources:
          type: object
          properties:
            cpu_quota: { type: number, format: float, minimum: 0, exclusiveMinimum: true }
            memory_mb: { type: integer, minimum: 64, maximum: 16384 }
            pids_limit: { type: integer, minimum: 1, maximum: 10000 }

    TopologyLink:
      type: object
      required: [from_node_key, to_node_key]
      properties:
        from_node_key: { type: string, maxLength: 64 }
        to_node_key: { type: string, maxLength: 64 }

    TopologyTrafficPolicy:
      type: object
      required: [source_node_key, target_node_key, action]
      properties:
        source_node_key: { type: string, maxLength: 64 }
        target_node_key: { type: string, maxLength: 64 }
        action: { $ref: "#/components/schemas/TopologyPolicyAction" }
        protocol:
          allOf:
            - $ref: "#/components/schemas/TopologyPolicyProtocol"
          nullable: true
          description: 细粒度 ACL 协议维度，支持 any / tcp / udp
        ports:
          type: array
          description: 细粒度 ACL 的目标端口列表；为空时表示匹配对应协议的全部端口
          items: { type: integer, minimum: 1, maximum: 65535 }

    ChallengeTopologyData:
      type: object
      required: [id, challenge_id, entry_node_key, nodes, created_at, updated_at]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        challenge_id: { $ref: "#/components/schemas/ID" }
        template_id: { $ref: "#/components/schemas/ID", nullable: true }
        entry_node_key: { type: string, maxLength: 64 }
        networks:
          type: array
          items: { $ref: "#/components/schemas/TopologyNetwork" }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/TopologyNode" }
        links:
          type: array
          items: { $ref: "#/components/schemas/TopologyLink" }
        policies:
          type: array
          items: { $ref: "#/components/schemas/TopologyTrafficPolicy" }
        created_at: { $ref: "#/components/schemas/ISODateTime" }
        updated_at: { $ref: "#/components/schemas/ISODateTime" }

    EnvironmentTemplateData:
      type: object
      required: [id, name, description, entry_node_key, nodes, usage_count, created_at, updated_at]
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { type: string, maxLength: 128 }
        description: { type: string }
        entry_node_key: { type: string, maxLength: 64 }
        networks:
          type: array
          items: { $ref: "#/components/schemas/TopologyNetwork" }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/TopologyNode" }
        links:
          type: array
          items: { $ref: "#/components/schemas/TopologyLink" }
        policies:
          type: array
          items: { $ref: "#/components/schemas/TopologyTrafficPolicy" }
        usage_count: { type: integer, minimum: 0 }
        created_at: { $ref: "#/components/schemas/ISODateTime" }
        updated_at: { $ref: "#/components/schemas/ISODateTime" }

    SaveChallengeTopologyRequest:
      type: object
      properties:
        template_id: { $ref: "#/components/schemas/ID", nullable: true }
        entry_node_key: { type: string, maxLength: 64, nullable: true }
        networks:
          type: array
          items: { $ref: "#/components/schemas/TopologyNetwork" }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/TopologyNode" }
        links:
          type: array
