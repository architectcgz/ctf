paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeLoginData" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeNull" }

  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册（注册成功即登录）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/LoginRequest"
              description: "注册字段以实现为准；此处至少包含 username/password"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeLoginData" }
        "400":
          description: Bad Request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeNull" }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新 Access Token（Refresh Token 由 HttpOnly Cookie 提供）
      security:
        - refreshTokenCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: "请求体为空"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeRefreshData" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeNull" }

  /auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeNull" }

  /auth/profile:
    get:
      tags: [Auth]
      summary: 获取当前用户信息
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelopeBase"
                  - type: object
                    required: [data]
                    properties:
                      data: { $ref: "#/components/schemas/AuthUser" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeNull" }

  /auth/password:
    put:
      tags: [Auth]
      summary: 修改密码
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string, format: password }
                new_password: { type: string, format: password }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeNull" }

  /auth/ws-ticket:
    post:
      tags: [Auth]
      summary: 获取 WebSocket 一次性 ticket
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeWsTicketData" }

  /challenges:
    get:
      tags: [Challenges]
      summary: 获取靶场列表（分页）
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, default: 20 }
        - in: query
          name: category
          schema: { $ref: "#/components/schemas/ChallengeCategory" }
        - in: query
          name: difficulty
          schema: { $ref: "#/components/schemas/ChallengeDifficulty" }
        - in: query
          name: sort
          schema:
            type: string
            description: '如 "created_at:desc"'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiEnvelopeChallengeListData" }

  /challenges/{id}:
    get:
      tags: [Challenges]
      summary: 获取靶场详情
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
