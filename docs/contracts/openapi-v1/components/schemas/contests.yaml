ContestMode: {type: string, enum: [jeopardy, awd, awd_plus, king_of_hill]}
ContestStatus:
  type: string
  enum:
  - draft
  - published
  - registering
  - running
  - frozen
  - ended
  - cancelled
  - archived
ContestListItem:
  type: object
  required: [id, title, mode, status, starts_at, ends_at]
  properties:
    id: {$ref: '#/components/schemas/ID'}
    title: {type: string}
    mode: {$ref: '#/components/schemas/ContestMode'}
    status: {$ref: '#/components/schemas/ContestStatus'}
    starts_at: {$ref: '#/components/schemas/ISODateTime'}
    ends_at: {$ref: '#/components/schemas/ISODateTime'}
    register_ends_at: {$ref: '#/components/schemas/ISODateTime', nullable: true}
ContestListData:
  type: object
  required: [list, total, page, page_size]
  properties:
    list: {type: array, items: {$ref: '#/components/schemas/ContestListItem'}}
    total: {type: integer, minimum: 0}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1}
ApiEnvelopeContestListData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestListData'}}
ContestDetailData:
  allOf:
  - {$ref: '#/components/schemas/ContestListItem'}
  - type: object
    properties:
      description: {type: string, nullable: true}
      rules: {type: string, nullable: true, description: Markdown}
      team_size_limit: {type: integer, nullable: true, minimum: 1}
      scoreboard_frozen: {type: boolean, nullable: true}
ApiEnvelopeContestDetailData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestDetailData'}}
ContestChallengeItem:
  type: object
  required:
  - id
  - challenge_id
  - title
  - category
  - difficulty
  - points
  - solved_count
  - is_solved
  properties:
    id: {$ref: '#/components/schemas/ID'}
    challenge_id: {$ref: '#/components/schemas/ID'}
    title: {type: string}
    category: {$ref: '#/components/schemas/ChallengeCategory'}
    difficulty: {$ref: '#/components/schemas/ChallengeDifficulty'}
    points: {type: integer, minimum: 0}
    solved_count: {type: integer, minimum: 0}
    is_solved: {type: boolean}
ApiEnvelopeContestChallengeListData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties:
      data: {type: array, items: {$ref: '#/components/schemas/ContestChallengeItem'}}
ScoreboardRow:
  type: object
  required: [rank, team_id, team_name, score, solved_count]
  properties:
    rank: {type: integer, minimum: 1}
    team_id: {$ref: '#/components/schemas/ID'}
    team_name: {type: string}
    score: {type: integer, minimum: 0}
    solved_count: {type: integer, minimum: 0}
    last_submission_at: {$ref: '#/components/schemas/ISODateTime', nullable: true}
ContestScoreboardData:
  type: object
  required: [contest, scoreboard, frozen]
  properties:
    contest:
      type: object
      required: [id, title, status, started_at, ends_at]
      properties:
        id: {$ref: '#/components/schemas/ID'}
        title: {type: string}
        status: {$ref: '#/components/schemas/ContestStatus'}
        started_at: {$ref: '#/components/schemas/ISODateTime'}
        ends_at: {$ref: '#/components/schemas/ISODateTime'}
    scoreboard:
      type: object
      required: [list, total, page, page_size]
      properties:
        list: {type: array, items: {$ref: '#/components/schemas/ScoreboardRow'}}
        total: {type: integer, minimum: 0}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1}
    frozen: {type: boolean}
ApiEnvelopeContestScoreboardData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestScoreboardData'}}
ContestAnnouncement:
  type: object
  required: [id, title, created_at]
  properties:
    id: {$ref: '#/components/schemas/ID'}
    title: {type: string}
    content: {type: string, nullable: true}
    created_at: {$ref: '#/components/schemas/ISODateTime'}
ApiEnvelopeContestAnnouncementListData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties:
      data: {type: array, items: {$ref: '#/components/schemas/ContestAnnouncement'}}
ApiEnvelopeContestAnnouncementData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestAnnouncement'}}
ContestRegistrationStatus: {type: string, enum: [pending, approved, rejected]}
ContestRegistration:
  type: object
  required:
  - id
  - contest_id
  - user_id
  - username
  - status
  - created_at
  - updated_at
  properties:
    id: {$ref: '#/components/schemas/ID'}
    contest_id: {$ref: '#/components/schemas/ID'}
    user_id: {$ref: '#/components/schemas/ID'}
    username: {type: string}
    team_id: {$ref: '#/components/schemas/ID', nullable: true}
    status: {$ref: '#/components/schemas/ContestRegistrationStatus'}
    reviewed_by: {$ref: '#/components/schemas/ID', nullable: true}
    reviewed_at: {$ref: '#/components/schemas/ISODateTime', nullable: true}
    created_at: {$ref: '#/components/schemas/ISODateTime'}
    updated_at: {$ref: '#/components/schemas/ISODateTime'}
ContestRegistrationListData:
  type: object
  required: [list, total, page, page_size]
  properties:
    list: {type: array, items: {$ref: '#/components/schemas/ContestRegistration'}}
    total: {type: integer, minimum: 0}
    page: {type: integer, minimum: 1}
    page_size: {type: integer, minimum: 1}
ApiEnvelopeContestRegistrationListData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestRegistrationListData'}}
ApiEnvelopeContestRegistrationData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestRegistration'}}
ReviewContestRegistrationRequest:
  type: object
  required: [status]
  properties:
    status: {type: string, enum: [approved, rejected]}
TeamMember:
  type: object
  required: [user_id, username, joined_at]
  properties: {user_id: {$ref: '#/components/schemas/ID'}, username: {type: string}, joined_at: {$ref: '#/components/schemas/ISODateTime'}}
TeamData:
  type: object
  required: [id, name, captain_user_id, members]
  properties:
    id: {$ref: '#/components/schemas/ID'}
    name: {type: string}
    invite_code: {type: string, nullable: true, description: 仅队长可见（如有）}
    captain_user_id: {$ref: '#/components/schemas/ID'}
    members: {type: array, items: {$ref: '#/components/schemas/TeamMember'}}
CreateTeamRequest:
  type: object
  required: [name]
  properties: {name: {type: string}}
ApiEnvelopeTeamData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/TeamData'}}
ContestMyProgressData:
  type: object
  required: [contest_id, solved]
  properties:
    contest_id: {$ref: '#/components/schemas/ID'}
    team_id: {$ref: '#/components/schemas/ID', nullable: true}
    solved:
      type: array
      items:
        type: object
        required: [contest_challenge_id, solved_at, points_earned]
        properties: {contest_challenge_id: {$ref: '#/components/schemas/ID'}, solved_at: {$ref: '#/components/schemas/ISODateTime'},
          points_earned: {type: integer, minimum: 0}}
ApiEnvelopeContestMyProgressData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestMyProgressData'}}
ApiEnvelopeContestListItemPageResult:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ContestListData'}}
