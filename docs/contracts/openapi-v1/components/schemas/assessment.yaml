MyProgressData:
  type: object
  required: [total_challenges, solved_challenges]
  properties:
    total_challenges: {type: integer, minimum: 0}
    solved_challenges: {type: integer, minimum: 0}
    by_category:
      type: object
      nullable: true
      additionalProperties:
        type: object
        required: [total, solved]
        properties: {total: {type: integer, minimum: 0}, solved: {type: integer, minimum: 0}}
    by_difficulty:
      type: object
      nullable: true
      additionalProperties:
        type: object
        required: [total, solved]
        properties: {total: {type: integer, minimum: 0}, solved: {type: integer, minimum: 0}}
ApiEnvelopeMyProgressData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/MyProgressData'}}
TimelineEvent:
  type: object
  required: [id, type, title, created_at]
  properties:
    id: {$ref: '#/components/schemas/ID'}
    type: {type: string, enum: [solve, submit, instance, hint]}
    title: {type: string}
    created_at: {$ref: '#/components/schemas/ISODateTime'}
    meta: {type: object, nullable: true, additionalProperties: true}
ApiEnvelopeMyTimelineData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties:
      data: {type: array, items: {$ref: '#/components/schemas/TimelineEvent'}}
SkillDimensionScore:
  type: object
  required: [key, name, value]
  properties:
    key: {type: string}
    name: {type: string}
    value: {type: number, minimum: 0, maximum: 100}
SkillProfileData:
  type: object
  required: [dimensions]
  properties:
    dimensions: {type: array, items: {$ref: '#/components/schemas/SkillDimensionScore'}}
    updated_at: {$ref: '#/components/schemas/ISODateTime', nullable: true}
ApiEnvelopeSkillProfileData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/SkillProfileData'}}
RecommendationItem:
  type: object
  required: [challenge_id, title, category, difficulty, reason]
  properties:
    challenge_id: {$ref: '#/components/schemas/ID'}
    title: {type: string}
    category: {$ref: '#/components/schemas/ChallengeCategory'}
    difficulty: {$ref: '#/components/schemas/ChallengeDifficulty'}
    reason: {type: string}
ApiEnvelopeRecommendationData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties:
      data: {type: array, items: {$ref: '#/components/schemas/RecommendationItem'}}
ReportExportData:
  type: object
  required: [report_id, status]
  properties:
    report_id: {$ref: '#/components/schemas/ID'}
    status: {type: string, enum: [ready, processing, failed]}
    download_url: {type: string, nullable: true}
    expires_at: {$ref: '#/components/schemas/ISODateTime', nullable: true}
    error_message: {type: string, nullable: true}
ApiEnvelopeReportExportData:
  allOf:
  - {$ref: '#/components/schemas/ApiEnvelopeBase'}
  - type: object
    required: [data]
    properties: {data: {$ref: '#/components/schemas/ReportExportData'}}
