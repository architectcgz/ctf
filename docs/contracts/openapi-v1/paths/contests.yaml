          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeContestChallengeListData'}}
/contests/{id}/challenges/{cid}/submissions:
  post:
    tags: [Contests]
    summary: 竞赛中提交 Flag
    description: 按动态计分规则结算本次提交；同一队伍同一题仅首次正确提交计分，未组队参赛者按个人维度去重。若该题随后出现新的正确提交，系统会按最新 solve_count 回溯重算该题全部历史正确提交，并同步修正队伍总分与 live
      排行榜。
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    - in: path
      name: cid
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    requestBody:
      required: true
      content:
        application/json: {schema: {$ref: '#/components/schemas/SubmitFlagRequest'}}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeSubmitFlagData'}}
/contests/{id}/awd/challenges/{cid}/submissions:
  post:
    tags: [Contests]
    summary: AWD 模式提交攻击 Flag
    description: 从当前登录用户的已审核报名记录解析攻击方队伍，按当前轮 Flag 校验提交结果，并写入 AWD 攻击日志；在 `contest.awd.previous_round_grace` 宽限期内同时接受上一轮 Flag。同一轮内同一攻击队对同一受害队同一题仅首次成功提交计分，后续成功重复提交只记日志不重复得分。
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    - in: path
      name: cid
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    requestBody:
      required: true
      content:
        application/json: {schema: {$ref: '#/components/schemas/SubmitAwdAttackRequest'}}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAwdAttackLogData'}}
