    tags: [Contests]
    summary: 报名竞赛
    description: 提交后默认进入待审核状态；已审核通过的重复报名按幂等成功处理。
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeNull'}}
/contests/{id}/challenges:
  get:
    tags: [Contests]
    summary: 竞赛题目列表
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    responses:
      '200':
        description: OK
