/admin/contests/{id}/export:
  post:
    tags: [Reports, Admin]
    summary: 导出赛事结果归档（JSON）
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              format: {type: string, enum: [json]}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeReportExportData'}}
/admin/dashboard:
  get:
    tags: [Admin]
    summary: 管理仪表盘（概览数据）
    security:
    - {sessionCookieAuth: []}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminDashboardData'}}
/admin/users:
  get:
    tags: [Admin]
    summary: 用户列表（分页）
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: query
      name: page
      schema: {type: integer, minimum: 1, default: 1}
    - in: query
      name: page_size
      schema: {type: integer, minimum: 1, default: 20}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminUserListData'}}
  post:
    tags: [Admin]
    summary: 创建用户
    security:
    - {sessionCookieAuth: []}
    requestBody:
      required: true
      content:
        application/json: {schema: {$ref: '#/components/schemas/AdminUserUpsertRequest'}}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminUserUpsertData'}}
/admin/users/{id}:
  put:
    tags: [Admin]
    summary: 更新用户
