        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeNull'}}
/admin/users/import:
  post:
    tags: [Admin]
    summary: 批量导入用户（文件上传）
    security:
    - {sessionCookieAuth: []}
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties: {file: {type: string, format: binary}}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminUserImportData'}}
