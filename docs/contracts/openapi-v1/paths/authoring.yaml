/authoring/challenge-imports:
  post:
    tags: [Authoring]
    summary: 预览题目包导入结果
    security:
    - {sessionCookieAuth: []}
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties: {file: {type: string, format: binary}}
    responses:
      '201':
        description: Created
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminChallengeImportPreviewData'}}
/authoring/challenge-imports/{id}:
  get:
    tags: [Authoring]
    summary: 获取题目包导入预览
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminChallengeImportPreviewData'}}
/authoring/challenge-imports/{id}/commit:
  post:
    tags: [Authoring]
    summary: 确认导入题目包
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminChallengeImportCommitData'}}
/authoring/challenges:
  get:
    tags: [Authoring]
    summary: 题目列表（分页）
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: query
      name: page
      schema: {type: integer, minimum: 1, default: 1}
    - in: query
      name: page_size
      schema: {type: integer, minimum: 1, default: 20}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminChallengeListData'}}
  post:
    tags: [Authoring]
    summary: 创建题目
    security:
    - {sessionCookieAuth: []}
    requestBody:
      required: true
      content:
        application/json: {schema: {type: object, description: 字段集以实现为准；返回 challenge 的列表字段子集}}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAdminChallengeUpsertData'}}
/authoring/awd-challenges:
  get:
    tags: [Authoring]
    summary: AWD 题目列表（分页）
    security:
    - {sessionCookieAuth: []}
    parameters:
    - {in: query, name: keyword, schema: {type: string}}
    - {in: query, name: service_type, schema: {$ref: '#/components/schemas/AWDServiceType'}}
    - {in: query, name: status, schema: {$ref: '#/components/schemas/AWDChallengeStatus'}}
    - in: query
      name: page
      schema: {type: integer, minimum: 1, default: 1}
    - in: query
      name: page_size
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAWDChallengePageData'}}
  post:
    tags: [Authoring]
    summary: 创建 AWD 题目
    security:
    - {sessionCookieAuth: []}
    requestBody:
      required: true
      content:
        application/json: {schema: {$ref: '#/components/schemas/CreateAWDChallengeRequest'}}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAWDChallengeData'}}
/authoring/awd-challenges/{id}:
  get:
    tags: [Authoring]
    summary: 获取 AWD 题目详情
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAWDChallengeData'}}
      '404': {description: Not Found}
  put:
    tags: [Authoring]
    summary: 更新 AWD 题目
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    requestBody:
      required: true
      content:
        application/json: {schema: {$ref: '#/components/schemas/UpdateAWDChallengeRequest'}}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeAWDChallengeData'}}
      '404': {description: Not Found}
  delete:
    tags: [Authoring]
    summary: 删除 AWD 题目
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    responses:
      '200':
        description: OK
        content:
          application/json: {schema: {$ref: '#/components/schemas/ApiEnvelopeNull'}}
      '404': {description: Not Found}
/authoring/challenges/{id}:
  put:
    tags: [Authoring]
    summary: 更新题目
    security:
    - {sessionCookieAuth: []}
    parameters:
    - in: path
      name: id
      required: true
      schema: {$ref: '#/components/schemas/ID'}
    requestBody:
