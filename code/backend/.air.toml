#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/ctf-api ./cmd/api"
entrypoint = ["./tmp/air/ctf-api"]
include_ext = ["go", "yaml", "yml", "toml"]
exclude_dir = ["tmp", "vendor", "storage"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"
log = "build-errors.log"

[log]
time = true

[misc]
clean_on_exit = true
