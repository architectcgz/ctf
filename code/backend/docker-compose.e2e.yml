services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ctf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123456
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - ctf-e2e-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ctf"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command:
      [
        "redis-server",
        "--requirepass",
        "redis123456",
        "--appendonly",
        "yes",
        "--maxmemory",
        "512mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "127.0.0.1:56379:6379"
    volumes:
      - ctf-e2e-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: dev
      CTF_HTTP_HOST: 0.0.0.0
      CTF_HTTP_PORT: 8080
      CTF_POSTGRES_HOST: postgres
      CTF_POSTGRES_PORT: 5432
      CTF_POSTGRES_DATABASE: ctf
      CTF_POSTGRES_USERNAME: postgres
      CTF_POSTGRES_PASSWORD: postgres123456
      CTF_REDIS_ADDR: redis:6379
      CTF_REDIS_PASSWORD: redis123456
      CTF_REDIS_DB: 2
      CTF_CONTAINER_FLAG_GLOBAL_SECRET: dev-integration-secret-123456789
    ports:
      - "127.0.0.1:18080:8080"

  migrate:
    image: migrate/migrate:v4.18.3
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:postgres123456@postgres:5432/ctf?sslmode=disable",
        "up",
      ]

volumes:
  ctf-e2e-postgres-data:
  ctf-e2e-redis-data:
