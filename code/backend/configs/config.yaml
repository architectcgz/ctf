app:
  name: ctf-platform
  env: dev
  version: dev

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

log:
  level: info
  format: json
  output_paths:
    - stdout
  error_output_paths:
    - stderr

postgres:
  host: 127.0.0.1
  port: 5432
  database: ctf
  username: postgres
  password: "" # 通过 CTF_POSTGRES_PASSWORD 注入
  ssl_mode: disable
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: 30m

redis:
  addr: 127.0.0.1:6379
  password: "" # 通过 CTF_REDIS_PASSWORD 注入
  db: 2
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

cors:
  allow_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - Content-Type
    - X-Request-ID
  expose_headers:
    - X-Request-ID
    - X-RateLimit-Limit
    - X-RateLimit-Remaining
    - X-RateLimit-Reset
    - Retry-After
  allow_credentials: true
  max_age: 12h

auth:
  session_ttl: 168h
  session_cookie_name: ctf_session
  session_cookie_path: /api/v1
  session_cookie_secure: false
  session_cookie_http_only: true
  session_cookie_same_site: lax
  session_key_prefix: ctf:auth:session
  cas:
    enabled: false
    base_url: ""
    login_path: /login
    validate_path: /serviceValidate
    service_url: ""
    auto_provision: false

rate_limit:
  redis_key_prefix: ctf:ratelimit
  anonymous:
    enabled: true
    limit: 300
    window: 1m
  global:
    enabled: true
    limit: 600
    window: 1m
  login:
    enabled: true
    limit: 10
    window: 1m
    lock_duration: 15m
  login_ip:
    enabled: true
    limit: 300
    window: 1m
  flag_submit:
    enabled: true
    limit: 5
    window: 1m

container:
  default_cpu_quota: 0.5
  default_memory: 268435456
  default_pids_limit: 100
  readonly_rootfs: false
  run_as_user: ""
  allowed_capabilities:
    - CHOWN
    - SETUID
    - SETGID
  seccomp: default
  port_range_start: 30000
  port_range_end: 40000
  default_exposed_port: 8080
  max_concurrent_per_user: 3
  default_ttl: 2h
  solve_grace_period: 10m
  max_extends: 2
  extend_duration: 1h
  cleanup_interval: "*/5 * * * *"
  cleanup_lock_ttl: 2m
  orphan_grace_period: 5m
  create_timeout: 30s
  start_probe_timeout: 800ms
  start_probe_interval: 300ms
  start_probe_attempts: 5
  flag_global_secret: "" # 建议通过 CTF_CONTAINER_FLAG_GLOBAL_SECRET 注入
  public_host: localhost
  proxy_ticket_ttl: 15m
  proxy_body_preview_size: 1024
  defense_ssh_enabled: false
  defense_ssh_host: 127.0.0.1
  defense_ssh_port: 2222
  registry:
    enabled: false
    server: "" # 例如 registry.example.edu 或 registry.local:5000
    username: "" # 建议通过 CTF_CONTAINER_REGISTRY_USERNAME 注入
    password: "" # 建议通过 CTF_CONTAINER_REGISTRY_PASSWORD 注入
    identity_token: "" # 可选，使用 token 认证时通过 CTF_CONTAINER_REGISTRY_IDENTITY_TOKEN 注入
  scheduler:
    enabled: true
    poll_interval: 1s
    batch_size: 4
    max_concurrent_starts: 4
    max_active_instances: 60

pagination:
  default_page_size: 20
  max_page_size: 100

challenge:
  solved_count_cache_ttl: 5m
  publish_check:
    enabled: true
    poll_interval: 2s
    batch_size: 1

score:
  cache_ttl: 5m
  lock_timeout: 5s
  max_ranking_limit: 100

cache:
  progress_ttl: 10m

assessment:
  redis_key_prefix: ctf:assessment:skill-profile
  full_rebuild_cron: "0 0 * * *"
  full_rebuild_timeout: 30m
  lock_ttl: 10s
  incremental_update_delay: 100ms
  incremental_update_timeout: 5s

recommendation:
  weak_threshold: 0.4
  cache_ttl: 1h
  default_limit: 6
  max_limit: 20

report:
  storage_dir: storage/exports
  default_format: pdf
  personal_timeout: 30s
  class_timeout: 2m
  file_ttl: 168h
  max_workers: 2

dashboard:
  cache_ttl: 30s
  alert_threshold: 80
  redis_key_prefix: ctf:dashboard

websocket:
  ticket_ttl: 30s
  ticket_key_prefix: ctf:ws:ticket
  heartbeat_interval: 30s
  read_timeout: 75s
  retry_initial_delay: 1s
  retry_max_delay: 30s

contest:
  status_update_interval: 1m
  status_update_batch_size: 1000
  status_update_lock_ttl: 30s
  base_score: 1000
  min_score: 100
  decay: 0.9
  first_blood_bonus: 0.1
  awd:
    scheduler_interval: 30s
    scheduler_lock_ttl: 30s
    scheduler_batch_size: 200
    round_interval: 5m
    round_lock_ttl: 30s
    previous_round_grace: 30s
    checker_timeout: 3s
    checker_health_path: /health
    checker_sandbox:
      image: python:3.12-alpine
      user: "65532:65532"
      work_dir: /checker
      timeout: 10s
      cpu_quota: 0.5
      memory_bytes: 134217728
      pids_limit: 64
      nofile_limit: 128
      output_limit_bytes: 32768
      # 默认关闭网络；script_checker 接入目标服务时必须由平台显式传入受控 network_mode。
      network_mode: ""
