app:
  env: prod
  version: 1.0.0

log:
  level: info
  format: json

postgres:
  username: ctf
  password: change_me
  ssl_mode: require
  max_open_conns: 40
  max_idle_conns: 20
  conn_max_lifetime: 30m

redis:
  password: change_me
  db: 0

cors:
  # 生产环境必须显式配置前端 Origin；空数组会在启动校验阶段被拒绝。
  allow_origins: []

auth:
  refresh_cookie_secure: true
  private_key_path: /etc/ctf/keys/private.pem
  public_key_path: /etc/ctf/keys/public.pem

container:
  # 生产部署时应显式配置可从浏览器访问的主机名或域名，不要依赖默认 localhost
  public_host: ctf.example.com
  # 启动判定会在容器创建后探测访问地址，只有探测通过才进入 running
  start_probe_timeout: 800ms
  start_probe_interval: 300ms
  start_probe_attempts: 5
  scheduler:
    enabled: true
    poll_interval: 1s
    batch_size: 4
    max_concurrent_starts: 4
    max_active_instances: 60
