app:
  env: prod
  version: 1.0.0

log:
  level: info
  format: json

postgres:
  username: ctf
  password: change_me
  ssl_mode: require
  max_open_conns: 40
  max_idle_conns: 20
  conn_max_lifetime: 30m

redis:
  password: change_me
  db: 0

cors:
  # 生产环境必须显式配置前端 Origin；空数组会在启动校验阶段被拒绝。
  allow_origins: []

auth:
  session_cookie_secure: true

container:
  # 生产部署时应显式配置可从浏览器访问的主机名或域名，不要依赖默认 localhost
  public_host: ctf.example.com
  # 如需开启 AWD 防守 SSH 网关，请配置为可被选手访问的地址和端口。
  defense_ssh_enabled: false
  defense_ssh_host: ctf.example.com
  defense_ssh_port: 2222
  defense_workbench_readonly_enabled: false
  defense_workbench_root: ""
  # 启动判定会在容器创建后探测访问地址，只有探测通过才进入 running
  start_probe_timeout: 800ms
  start_probe_interval: 300ms
  start_probe_attempts: 5
  registry:
    enabled: false
    scheme: https
    server: "" # 生产环境如需私有仓库，使用 CTF_CONTAINER_REGISTRY_SERVER 注入
    username: "" # 使用 CTF_CONTAINER_REGISTRY_USERNAME 注入
    password: "" # 使用 CTF_CONTAINER_REGISTRY_PASSWORD 注入
    identity_token: "" # 可选，使用 CTF_CONTAINER_REGISTRY_IDENTITY_TOKEN 注入
    build_enabled: false
    build_timeout: 10m
    build_concurrency: 1
    default_tag_policy: latest
  scheduler:
    enabled: true
    poll_interval: 1s
    batch_size: 4
    max_concurrent_starts: 4
    max_active_instances: 60
