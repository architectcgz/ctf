app:
  env: prod
  version: 1.0.0

log:
  level: info
  format: json

postgres:
  username: ctf
  password: change_me
  ssl_mode: require
  max_open_conns: 40
  max_idle_conns: 20
  conn_max_lifetime: 30m

redis:
  password: change_me
  db: 0

cors:
  allow_origins: []

auth:
  refresh_cookie_secure: true
  private_key_path: /etc/ctf/keys/private.pem
  public_key_path: /etc/ctf/keys/public.pem

container:
  scheduler:
    enabled: true
    poll_interval: 1s
    batch_size: 4
    max_concurrent_starts: 4
    max_active_instances: 60
