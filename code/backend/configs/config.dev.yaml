app:
  env: dev
  version: dev

log:
  level: debug
  format: console

redis:
  password: "" # 开发环境通过 CTF_REDIS_PASSWORD 注入
  db: 2

auth:
  session_cookie_secure: false

container:
  # 开发环境默认经由宿主机本地端口访问实例，避免 localhost 解析到 IPv6 [::1]
  public_host: 127.0.0.1
  defense_ssh_enabled: true
  defense_ssh_host: 127.0.0.1
  defense_ssh_port: 2222
  defense_workbench_readonly_enabled: true
  defense_workbench_root: /home/student
