version: "3.9"

services:
  ctf-postgres:
    image: postgres:16-alpine
    container_name: ctf-postgres
    environment:
      POSTGRES_DB: ctf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123456
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ctf-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ctf"]
      interval: 10s
      timeout: 5s
      retries: 5

  ctf-redis:
    image: redis:7.4-alpine
    container_name: ctf-redis
    command:
      [
        "redis-server",
        "--requirepass",
        "redis123456",
        "--appendonly",
        "yes",
        "--maxmemory",
        "512mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ctf-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ctf-postgres-data:
  ctf-redis-data:
