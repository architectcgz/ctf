version: "3.9"

services:
  ctf-postgres:
    image: postgres:16-alpine
    container_name: ctf-postgres
    environment:
      POSTGRES_DB: ctf
      POSTGRES_USER: ctf
      POSTGRES_PASSWORD: ctf_dev_password
    ports:
      - "5432:5432"
    volumes:
      - ctf-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctf -d ctf"]
      interval: 10s
      timeout: 5s
      retries: 5

  ctf-redis:
    image: redis:7-alpine
    container_name: ctf-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ctf-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ctf-postgres-data:
  ctf-redis-data:
