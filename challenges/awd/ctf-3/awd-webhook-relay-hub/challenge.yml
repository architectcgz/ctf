api_version: v1
kind: challenge

meta:
  mode: awd
  slug: awd-webhook-relay-hub
  title: Webhook Relay Hub
  category: web
  difficulty: medium
  points: 150
  tags:
    - mode:awd
    - stack:web
    - stack:flask
    - topic:ssrf
    - topic:topology
    - topic:webhook
    - topic:internal-replay

content:
  statement: statement.md
  attachments: []

flag:
  type: dynamic
  prefix: flag

hints:
  - level: 1
    title: Hint 1
    content: 先看公开的 feed 示例，它会泄露内部 replay 节点的命名方式，再想想谁能解析这个内网域名。

runtime:
  type: container
  image:
    ref: 127.0.0.1:5000/awd/awd-webhook-relay-hub:20260510

extensions:
  topology:
    enabled: true
    source: docker/topology.yml
  awd:
    service_type: multi_container
    deployment_mode: topology
    version: v2026.05
    checker:
      type: http_standard
      config:
        put_flag:
          method: PUT
          path: /api/flag
          headers:
            X-AWD-Checker-Token: "{{CHECKER_TOKEN}}"
          expected_status: 200
          body_template: "{{FLAG}}"
        get_flag:
          method: GET
          path: /api/flag
          headers:
            X-AWD-Checker-Token: "{{CHECKER_TOKEN}}"
          expected_status: 200
          expected_substring: "{{FLAG}}"
        havoc:
          method: GET
          path: /health
          expected_status: 200
    flag_policy:
      mode: dynamic_team
      config:
        flag_prefix: flag
    defense_entry:
      mode: http
    access_config:
      public_base_url: http://{{TEAM_HOST}}:8080
      service_port: 8080
      exposed_ports:
        - port: 8080
          protocol: tcp
          purpose: http
    runtime_config:
      instance_sharing: per_team
      service_port: 8080
      checker_token_env: CHECKER_TOKEN
      topology_source: docker/topology.yml
      topology_entry_node_key: relay-web
      defense_workspace:
        entry_mode: ssh
        seed_root: docker/workspace
        workspace_roots:
          - docker/workspace/src
          - docker/workspace/data
        writable_roots:
          - docker/workspace/src
        readonly_roots:
          - docker/workspace/data
        runtime_mounts:
          - source: docker/workspace/src
            target: /workspace/src
            mode: rw
          - source: docker/workspace/data
            target: /workspace/data
            mode: rw
      defense_scope:
        protected_paths:
          - docker/runtime/app.py
          - docker/runtime/ctf_runtime.py
          - docker/runtime/requirements.txt
          - docker/check/check.py
          - docker/topology.yml
          - challenge.yml
        service_contracts:
          - /health 必须返回 200
          - /api/flag 必须保留 X-AWD-Checker-Token 校验
          - /api/flag 必须支持 PUT 写入与 GET 读取本轮动态 Flag
          - relay-web 必须继续提供 /feeds/demo 与 /preview
          - relay-worker 需要保留内部 replay 链路
          - relay-store 需要保留内部归档读取能力
