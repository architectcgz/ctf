name: ctf

services:
  edge-gateway:
    image: 127.0.0.1:5000/awd/awd-forwarded-admin-gateway:20260510
    build:
      context: .
      dockerfile: runtime/Dockerfile
    labels:
      managed-by: ctf-platform
      ctf-component: challenge-instance
      ctf.source: challenge-library
      ctf.challenge.slug: awd-forwarded-admin-gateway
    ports:
      - "18132:8080"
    environment:
      ROLE: edge-gateway
      APP_PORT: "8080"
      FLAG: "flag{awd_forwarded_admin_gateway_demo}"
      FLAG_PATH: /shared/flag
      CHECKER_TOKEN: "demo-checker-token"
      ADMIN_BASE_URL: "http://admin-app:9091"
    volumes:
      - ./runtime/app.py:/app/app.py:ro
      - ./runtime/ctf_runtime.py:/app/ctf_runtime.py:ro
      - ./workspace/src:/workspace/src:rw
      - gateway-data:/workspace/data
      - gateway-flag:/shared
    depends_on:
      admin-app:
        condition: service_healthy
    networks:
      - public
      - transit
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/health", timeout=2)
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 2s

  admin-app:
    image: 127.0.0.1:5000/awd/awd-forwarded-admin-gateway:20260510
    build:
      context: .
      dockerfile: runtime/Dockerfile
    labels:
      managed-by: ctf-platform
      ctf-component: challenge-instance
      ctf.source: challenge-library
      ctf.challenge.slug: awd-forwarded-admin-gateway
    environment:
      ROLE: admin-app
      APP_PORT: "9091"
      FLAG: "flag{awd_forwarded_admin_gateway_demo}"
      FLAG_PATH: /shared/flag
      CHECKER_TOKEN: "demo-checker-token"
      AUDIT_BASE_URL: "http://audit-db:9092"
    volumes:
      - ./runtime/app.py:/app/app.py:ro
      - ./runtime/ctf_runtime.py:/app/ctf_runtime.py:ro
      - ./workspace/src:/workspace/src:rw
      - gateway-data:/workspace/data
      - gateway-flag:/shared
    depends_on:
      audit-db:
        condition: service_healthy
    networks:
      - transit
      - audit
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:9091/health", timeout=2)
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 2s

  audit-db:
    image: 127.0.0.1:5000/awd/awd-forwarded-admin-gateway:20260510
    build:
      context: .
      dockerfile: runtime/Dockerfile
    labels:
      managed-by: ctf-platform
      ctf-component: challenge-instance
      ctf.source: challenge-library
      ctf.challenge.slug: awd-forwarded-admin-gateway
    environment:
      ROLE: audit-db
      APP_PORT: "9092"
      FLAG: "flag{awd_forwarded_admin_gateway_demo}"
      FLAG_PATH: /shared/flag
      CHECKER_TOKEN: "demo-checker-token"
    volumes:
      - ./runtime/app.py:/app/app.py:ro
      - ./runtime/ctf_runtime.py:/app/ctf_runtime.py:ro
      - ./workspace/src:/workspace/src:rw
      - gateway-data:/workspace/data
      - gateway-flag:/shared
    networks:
      - audit
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:9092/health", timeout=2)
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 2s

volumes:
  gateway-data:
  gateway-flag:

networks:
  public:
    labels:
      managed-by: ctf-platform
      ctf-component: challenge-instance
  transit:
    internal: true
    labels:
      managed-by: ctf-platform
      ctf-component: challenge-instance
  audit:
    internal: true
    labels:
      managed-by: ctf-platform
      ctf-component: challenge-instance
