api_version: v1
kind: topology
entry_node_key: render-web
networks:
  - key: public
    name: Public ingress
  - key: render
    name: Render plane
    internal: true
  - key: cache
    name: Cache plane
    internal: true
nodes:
  - key: render-web
    name: Render Web
    tier: edge
    image:
      ref: 127.0.0.1:5000/awd/awd-preview-render-farm:20260510
    service_port: 8080
    inject_flag: true
    network_keys: [public, render]
    env:
      ROLE: render-web
      APP_PORT: "8080"
      FLAG_PATH: /shared/flag
      RENDER_BASE_URL: http://render-worker:9091
  - key: render-worker
    name: Render Worker
    tier: app
    image:
      ref: 127.0.0.1:5000/awd/awd-preview-render-farm:20260510
    service_port: 9091
    inject_flag: true
    network_keys: [render, cache]
    env:
      ROLE: render-worker
      APP_PORT: "9091"
      FLAG_PATH: /shared/flag
      ASSET_BASE_URL: http://asset-cache:9092
  - key: asset-cache
    name: Asset Cache
    tier: data
    image:
      ref: 127.0.0.1:5000/awd/awd-preview-render-farm:20260510
    service_port: 9092
    inject_flag: true
    network_keys: [cache]
    env:
      ROLE: asset-cache
      APP_PORT: "9092"
      FLAG_PATH: /shared/flag
links:
  - from_node_key: render-web
    to_node_key: render-worker
  - from_node_key: render-worker
    to_node_key: asset-cache
policies:
  - source_node_key: render-web
    target_node_key: render-worker
    action: allow
    protocol: tcp
    ports: [9091]
  - source_node_key: render-worker
    target_node_key: asset-cache
    action: allow
    protocol: tcp
    ports: [9092]
