name: ctf

services:
  tcp-gate:
    image: ctf/awd/awd-tcp-length-gate:latest
    build:
      context: .
      dockerfile: runtime/Dockerfile
    labels:
      ctf.project: ctf
      ctf.source: challenge-library
      ctf.challenge.slug: awd-tcp-length-gate
    ports:
      - "18084:8080"
    environment:
      FLAG: "flag{awd_tcp_length_gate_demo}"
    volumes:
      - ./runtime/app.py:/app/app.py:ro
      - ./runtime/ctf_runtime.py:/app/ctf_runtime.py:ro
      - ./workspace/src:/workspace/src:rw
      - tcp-gate-data:/workspace/data

volumes:
  tcp-gate-data:
