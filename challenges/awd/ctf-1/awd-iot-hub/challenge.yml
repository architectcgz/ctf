api_version: v1
kind: challenge

meta:
  mode: awd
  slug: awd-iot-hub
  title: IoT 设备管理平台
  category: misc
  difficulty: hard
  points: 100
  tags:
    - mode:awd
    - stack:web
    - topic:default-credential
    - topic:topic-acl
    - topic:firmware-security

content:
  statement: statement.md
  attachments: []

flag:
  type: dynamic
  prefix: flag

hints:
  - level: 1
    title: Hint 1
    content: Topic 授权不能只判断字符串前缀。

runtime:
  type: container
  image:
    tag: latest

topology:
  entry_node_key: api
  networks:
    - key: public
      name: Public attack surface
    - key: device
      name: Device telemetry plane
      internal: true
  nodes:
    - key: api
      name: IoT Hub API
      service_port: 8080
      inject_flag: true
      network_keys: [public, device]
  policies:
    - source_node_key: api
      target_node_key: api
      action: allow
      protocol: tcp
      ports: [8080]

extensions:
  topology:
    enabled: true
    source: challenge.yml
  awd:
    service_type: web_http
    deployment_mode: single_container
    version: v2026.04
    checker:
      type: http_standard
      config:
        put_flag:
          method: PUT
          path: /api/flag
          headers:
            X-AWD-Checker-Token: demo-checker-token
          expected_status: 200
          body_template: "{{FLAG}}"
        get_flag:
          method: GET
          path: /api/flag
          headers:
            X-AWD-Checker-Token: demo-checker-token
          expected_status: 200
          expected_substring: "{{FLAG}}"
        havoc:
          method: GET
          path: /health
          expected_status: 200
    flag_policy:
      mode: dynamic_team
      config:
        flag_prefix: flag
    defense_entry:
      mode: http
    access_config:
      public_base_url: http://{{TEAM_HOST}}:8080
      service_port: 8080
      exposed_ports:
        - port: 8080
          protocol: tcp
          purpose: http
    runtime_config:
      instance_sharing: per_team
      service_port: 8080
      checker_token_env: CHECKER_TOKEN
      defense_workspace:
        entry_mode: ssh
        seed_root: docker/workspace
        workspace_roots:
          - docker/workspace/src
          - docker/workspace/data
        writable_roots:
          - docker/workspace/src
        readonly_roots:
          - docker/workspace/data
        runtime_mounts:
          - source: docker/workspace/src
            target: /workspace/src
            mode: rw
          - source: docker/workspace/data
            target: /workspace/data
            mode: rw
      defense_scope:
        protected_paths:
          - docker/runtime/app.py
          - docker/runtime/ctf_runtime.py
          - docker/runtime/requirements.txt
          - docker/check/check.py
          - challenge.yml
        service_contracts:
          - /health 必须返回 200
          - /api/flag 必须保留 X-AWD-Checker-Token 校验
          - /api/flag 必须支持 PUT 写入与 GET 读取本轮动态 Flag
          - 设备遥测、Topic 查询、命令下发和固件读取入口需要保持可用
