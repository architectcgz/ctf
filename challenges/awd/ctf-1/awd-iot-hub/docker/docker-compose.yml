name: ctf

services:
  iot-hub:
    image: ctf/awd/awd-iot-hub:latest
    build:
      context: .
      dockerfile: runtime/Dockerfile
    labels:
      ctf.project: ctf
      ctf.source: challenge-library
      ctf.challenge.slug: awd-iot-hub
    ports:
      - "18083:8080"
    environment:
      FLAG: "flag{awd_iot_hub_demo}"
      DEVICE_KEY: "device-demo-key"
      CHECKER_TOKEN: "demo-checker-token"
    volumes:
      - ./runtime/app.py:/app/app.py:ro
      - ./runtime/ctf_runtime.py:/app/ctf_runtime.py:ro
      - ./workspace/src:/workspace/src:rw
      - iot-data:/workspace/data

volumes:
  iot-data:
