name: ctf

services:
  iot-hub:
    image: ctf/awd/awd-iot-hub:latest
    build: .
    labels:
      ctf.project: ctf
      ctf.source: challenge-library
      ctf.challenge.slug: awd-iot-hub
    ports:
      - "18083:8080"
    environment:
      FLAG: "flag{awd_iot_hub_demo}"
      DEVICE_KEY: "device-demo-key"
      CHECKER_TOKEN: "demo-checker-token"
    volumes:
      - ./app.py:/app/app.py:ro
      - ./challenge_app.py:/app/challenge_app.py:ro
      - ./ctf_runtime.py:/app/ctf_runtime.py:ro
      - iot-data:/data

volumes:
  iot-data:
