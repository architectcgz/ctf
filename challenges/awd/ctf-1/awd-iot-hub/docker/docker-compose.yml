services:
  iot-hub:
    image: ctf/awd-iot-hub:latest
    build: ./app
    ports:
      - "18083:8080"
    environment:
      FLAG: "flag{awd_iot_hub_demo}"
      DEVICE_KEY: "device-demo-key"
      CHECKER_TOKEN: "demo-checker-token"
    volumes:
      - ./app/app.py:/app/app.py:ro
      - iot-data:/data

volumes:
  iot-data:
