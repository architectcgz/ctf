name: ctf

services:
  drive-app:
    image: ctf/awd/awd-campus-drive:latest
    build:
      context: .
      dockerfile: runtime/Dockerfile
    labels:
      ctf.project: ctf
      ctf.source: challenge-library
      ctf.challenge.slug: awd-campus-drive
    ports:
      - "18082:8080"
    environment:
      FLAG: "flag{awd_campus_drive_demo}"
      CHECKER_TOKEN: "demo-checker-token"
    volumes:
      - ./runtime/app.py:/app/app.py:ro
      - ./runtime/ctf_runtime.py:/app/ctf_runtime.py:ro
      - ./workspace/src:/workspace/src:rw
      - drive-data:/workspace/data

volumes:
  drive-data:
