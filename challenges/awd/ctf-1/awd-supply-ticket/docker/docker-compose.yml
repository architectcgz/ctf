name: ctf

services:
  ticket-app:
    image: ctf/awd-supply-ticket:latest
    build: .
    labels:
      ctf.project: ctf
      ctf.source: challenge-library
      ctf.challenge.slug: awd-supply-ticket
    ports:
      - "18081:8080"
    environment:
      FLAG: "flag{awd_supply_ticket_demo}"
      ADMIN_PASSWORD: "admin123"
      CHECKER_TOKEN: "demo-checker-token"
    volumes:
      - ./app/app.py:/app/app.py:ro
      - ticket-data:/data

volumes:
  ticket-data:
