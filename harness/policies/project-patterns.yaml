{
  "list_page": {
    "description": "Standard backoffice list page with workspace header, filter/search toolbar, directory shell, data table or directory grid, and pagination.",
    "examples": [
      "code/frontend/src/components/teacher/student-management/StudentManagementPage.vue",
      "code/frontend/src/views/notifications/NotificationList.vue",
      "code/frontend/src/components/teacher/class-management/ClassManagementPage.vue"
    ],
    "must_reuse": [
      "code/frontend/src/components/common/WorkspaceDirectoryToolbar.vue",
      "code/frontend/src/components/common/WorkspaceDataTable.vue",
      "code/frontend/src/components/common/WorkspaceDirectoryPagination.vue",
      "code/frontend/src/components/common/PagePaginationControls.vue",
      "code/frontend/src/components/common/AppEmpty.vue",
      "code/frontend/src/components/common/AppLoading.vue"
    ]
  },
  "detail_page": {
    "description": "Standard detail page with route-level data loader, header actions, and structured content panels.",
    "examples": [
      "code/frontend/src/views/challenges/ChallengeDetail.vue",
      "code/frontend/src/views/platform/ChallengeDetail.vue",
      "code/frontend/src/views/notifications/NotificationDetail.vue"
    ],
    "must_reuse": [
      "code/frontend/src/components/common/PageHeader.vue",
      "code/frontend/src/components/common/AppEmpty.vue",
      "code/frontend/src/composables/useAbortController.ts"
    ]
  },
  "form_or_drawer": {
    "description": "Standard create/edit flow built as modal or drawer with shared destructive confirm and overlay behavior.",
    "examples": [
      "code/frontend/src/components/notifications/AdminNotificationPublishDrawer.vue",
      "code/frontend/src/components/platform/audit/AuditActorDetailModal.vue",
      "code/frontend/src/components/common/DeleteConfirmModal.vue"
    ],
    "must_reuse": [
      "code/frontend/src/components/common/AppDestructiveConfirm.vue",
      "code/frontend/src/components/common/modal-templates/useOverlayBehavior.ts"
    ]
  },
  "route_page_hook": {
    "description": "Route-level page logic lives in features/*/model or composables/use*.ts and owns async loading, query sync, filters, pagination, and submission flow.",
    "examples": [
      "code/frontend/src/features/student-directory/model/useStudentListQuery.ts",
      "code/frontend/src/features/platform-contests/model/useContestManagePage.ts",
      "code/frontend/src/features/teacher-student-analysis/model/useTeacherStudentAnalysisPage.ts"
    ],
    "must_reuse": [
      "code/frontend/src/composables/usePagination.ts",
      "code/frontend/src/composables/useAbortController.ts",
      "code/frontend/src/composables/useRouteQueryTabs.ts"
    ]
  },
  "api_wrapper": {
    "description": "HTTP wrappers stay under src/api, call request.ts, and keep normalize/contract mapping next to endpoint groups.",
    "examples": [
      "code/frontend/src/api/admin/users.ts",
      "code/frontend/src/api/teacher/students.ts",
      "code/frontend/src/api/notification.ts"
    ],
    "must_reuse": [
      "code/frontend/src/api/request.ts",
      "code/frontend/src/api/contracts.ts"
    ]
  },
  "backend_module_usecase": {
    "description": "Backend use cases live under internal/module/<module>/application and should reuse domain rules, ports, contracts, context propagation, and existing module service shapes before adding a new flow.",
    "examples": [
      "code/backend/internal/module/challenge/application",
      "code/backend/internal/module/contest/application",
      "code/backend/internal/module/practice/application"
    ],
    "must_reuse": [
      "code/backend/internal/module/*/domain",
      "code/backend/internal/module/*/ports",
      "code/backend/internal/module/*/contracts"
    ]
  },
  "backend_repository_port": {
    "description": "Repository work must start from the consumer-side port and existing infrastructure adapter. Split or extend the smallest capability port instead of adding parallel repository interfaces.",
    "examples": [
      "code/backend/internal/module/challenge/ports/ports.go",
      "code/backend/internal/module/challenge/infrastructure/repository.go",
      "code/backend/internal/module/contest/infrastructure/contest_repository.go"
    ],
    "must_reuse": [
      "code/backend/internal/module/*/ports",
      "code/backend/internal/module/*/infrastructure",
      "code/backend/internal/module/*/testsupport"
    ]
  },
  "backend_api_handler": {
    "description": "Backend API handlers should reuse module api handler structure, contracts, auth/context extraction, validation, error mapping, and application use cases before creating new transport glue.",
    "examples": [
      "code/backend/internal/module/challenge/api",
      "code/backend/internal/module/contest/api",
      "code/backend/internal/module/ops/api"
    ],
    "must_reuse": [
      "code/backend/internal/module/*/api",
      "code/backend/internal/module/*/contracts",
      "code/backend/internal/authctx",
      "code/backend/internal/validation"
    ]
  },
  "backend_readmodel_query": {
    "description": "Cross-module read/query work should reuse existing readmodel modules or owner contracts instead of adding direct cross-module repository reads.",
    "examples": [
      "code/backend/internal/module/practice_readmodel",
      "code/backend/internal/module/teaching_readmodel"
    ],
    "must_reuse": [
      "code/backend/internal/module/*_readmodel/ports",
      "code/backend/internal/module/*_readmodel/infrastructure",
      "code/backend/internal/module/*/contracts"
    ]
  },
  "backend_job_worker": {
    "description": "Background jobs, workers, runners, and scheduled flows must reuse existing context, lock, idempotency, timeout, and runtime patterns before adding a new worker path.",
    "examples": [
      "code/backend/internal/module/contest/application/jobs",
      "code/backend/internal/pkg/redislock",
      "code/backend/internal/module/runtime"
    ],
    "must_reuse": [
      "code/backend/internal/module/*/application/jobs",
      "code/backend/internal/pkg/redislock",
      "code/backend/internal/module/*/runtime"
    ]
  },
  "backend_mapper_contract": {
    "description": "DTO/model/domain mapping should reuse generated mapper conventions, shared mapper helpers, and existing contracts before adding hand-written structural copying.",
    "examples": [
      "code/backend/internal/module/challenge/domain/response_mapper_goverter.go",
      "code/backend/internal/module/challenge/domain/response_mapper_goverter_gen.go",
      "code/backend/internal/shared/mapperhelper",
      "code/backend/internal/shared/mapperutil"
    ],
    "must_reuse": [
      "code/backend/internal/shared/mapperhelper",
      "code/backend/internal/shared/mapperutil",
      "code/backend/internal/module/*/contracts"
    ]
  },
  "backend_migration_schema": {
    "description": "Schema changes must reuse existing migration style, UTC timestamp contract, model conventions, repository tests, and API contract documentation before adding a new database shape.",
    "examples": [
      "code/backend/migrations",
      "code/backend/internal/model",
      "code/backend/internal/module/*/infrastructure"
    ],
    "must_reuse": [
      "code/backend/migrations",
      "code/backend/internal/model",
      "docs/contracts"
    ]
  }
}
